<!doctype html>
<html lang="de">
<head>
  <title>{{title}}</title>
  <link rel="stylesheet" href="/src/styles/style.css"/>
  <link rel="stylesheet" href="/src/styles/artist.css"/>
  <script src="/src/scripts/common.ts" type="module"></script>
</head>
<body class="h-card">
<header>
  <h1 class="p-name span-3 ratio-auto">{{artistName}}</h1>
  <a class="u-url" href="{{base}}artist/{{slug}}" hidden></a>
  <div class="span-3 ratio-auto">
    {{#headerImages}}<div class="artist-header-images span-2 ratio-wide">{{> artist-header-image}}</div>{{/headerImages}}
  </div>
</header>
<main>
  {{#mixLinks}}
  <h2 class="span-3 ratio-auto">Mixes</h2>
  <ul id="mix-links" class="span-3 ratio-auto">{{> mix-link}}</ul>
  {{/mixLinks}}
  {{#attachment}}<p id="attachments" class="span-3 ratio-auto">{{attachment}}</p>{{/attachment}}
</main>
<footer></footer>
</body>
</html>
