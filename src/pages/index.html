<!doctype html>
<html lang="de">
<head>
    <title>{{title}}</title>
    <link rel="stylesheet" href="/src/styles/style.css"/>
    <script src="/src/scripts/common.ts" type="module"></script>
</head>
<body>
<header></header>
<main>
    <div class="hero">
        {{#hasNextEvent}}
        <article class="h-event next-event" id="next-event">
            <time class="dt-start" datetime="{{nextEventDate}}">{{nextEventDateLabel}}</time>
            <img class="u-photo" src="{{base}}events/{{nextEventFlyer}}" alt="Monsters of Jungle Flyer" />
            <div class="e-content">{{nextEventBody}}</div>
        </article>
        {{/hasNextEvent}}
    </div>
    {{#artists}}
    <div id="artist-grid" class="artist-grid">{{> artist-card}}</div>
    {{/artists}}
</main>
<footer></footer>
</body>
</html>
